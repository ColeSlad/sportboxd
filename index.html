    --accent-dim: #00b37d;
    --accent-glow: rgba(0,229,160,0.15);
    --text: #f2f2f2;
    --text-muted: #888;
    --text-dim: #555;
    --border: #222;
    --border-accent: rgba(0,229,160,0.3);
    --gold: #ffd700;
    --red: #ff4757;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,229,160,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,180,120,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  /* Typography */
  .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
  .font-condensed { font-family: 'Barlow Condensed', sans-serif; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  /* Custom Components */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .card:hover { border-color: #333; }
  .card-interactive:hover {
    border-color: var(--border-accent);
    transform: translateY(-2px);
    cursor: pointer;
  }

  .accent-text { color: var(--accent); }
  .muted-text { color: var(--text-muted); }

  /* Stars */
  .star { color: var(--text-dim); cursor: pointer; transition: color 0.15s; font-size: 1.2rem; }
  .star.filled { color: var(--gold); }
  .star.accent { color: var(--accent); }
  .star:hover { color: var(--gold); }

  /* Nav */
  .nav-link {
    color: var(--text-muted);
    transition: color 0.2s;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .nav-link:hover, .nav-link.active { color: var(--text); }
  .nav-link.active { color: var(--accent); }

  /* Pill badges */
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px;
    border-radius: 100px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .badge-green { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
  .badge-red { background: rgba(255,71,87,0.12); color: var(--red); border: 1px solid rgba(255,71,87,0.2); }
  .badge-gold { background: rgba(255,215,0,0.12); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
  .badge-gray { background: rgba(255,255,255,0.06); color: var(--text-muted); border: 1px solid var(--border); }

  /* Team colors for logos */
  .team-logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    font-weight: 400;
    flex-shrink: 0;
  }

  /* Score display */
  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  /* Input */
  input, textarea, select {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    padding: 10px 14px;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--border-accent); }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); }

  /* Avatar */
  .avatar {
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Gradient text */
  .gradient-text {
    background: linear-gradient(135deg, var(--accent) 0%, #00b3ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Button */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 8px 18px;
    border-radius: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #00f5b0; }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: #444; color: var(--text); }
  .btn-sm { padding: 5px 12px; font-size: 0.72rem; }

  /* Hover reveal */
  .hover-group .hover-reveal { opacity: 0; transition: opacity 0.2s; }
  .hover-group:hover .hover-reveal { opacity: 1; }

  /* Scrollable row */
  .scroll-row {
    display: flex; gap: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .scroll-row::-webkit-scrollbar { display: none; }

  /* Play card highlight */
  .play-card { border-left: 3px solid transparent; }
  .play-card:hover { border-left-color: var(--accent); }

  /* Loading shimmer */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, #1a1a1a 25%, #242424 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  /* Fade in */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.3s ease forwards; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;

  .modal-box {
    background: var(--bg-card);
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    width: 100%; max-width: 520px;
    max-height: 90vh;

  .tab {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 0.78rem;
    padding: 8px 0;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .rating-bar-bg { background: var(--bg-card3); border-radius: 2px; height: 4px; }

    display: flex;

function StarRating({ value, onChange, size = 'md', accent = false }) {
  const [hover, setHover] = useState(0);
  const sizes = { sm: '1rem', md: '1.4rem', lg: '1.8rem' };
  return (
    <div style={{ display: 'flex', gap: '2px' }}>
      {[1,2,3,4,5].map(n => (
        <span
          key={n}
          className={`star ${(hover || value) >= n ? (accent ? 'accent' : 'filled') : ''}`}
          style={{ fontSize: sizes[size], cursor: onChange ? 'pointer' : 'default' }}
          onMouseEnter={() => onChange && setHover(n)}
          onMouseLeave={() => onChange && setHover(0)}
          onClick={() => onChange && onChange(n)}
        >★</span>
      ))}
    </div>
  );
}

function BrowsePage({ onNavigate }) {
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState('all');
  const [filterTeam, setFilterTeam] = useState('all');
  const [sortBy, setSortBy] = useState('date');

  // NOTE: Replace with balldontlie.io API:
  //   GET https://api.balldontlie.io/v1/games?search=<query>&team_ids[]=<id>&postseason=true
  const filtered = MOCK_GAMES.filter(g => {
    const query = search.toLowerCase();
    const matchSearch = !query ||
      TEAMS[g.homeTeam]?.name.toLowerCase().includes(query) ||
      TEAMS[g.awayTeam]?.name.toLowerCase().includes(query) ||
      g.description.toLowerCase().includes(query) ||
      (g.game || '').toLowerCase().includes(query);
    const matchType = filterType === 'all' ||
      (filterType === 'playoffs' && g.type === 'Playoffs') ||
      (filterType === 'finals' && g.type === 'Finals') ||
      (filterType === 'regular' && g.type === 'Regular Season') ||
      (filterType === 'ot' && g.overtime);
    const matchTeam = filterTeam === 'all' || g.homeTeam === filterTeam || g.awayTeam === filterTeam;
    return matchSearch && matchType && matchTeam;
  }).sort((a,b) => {
    if (sortBy === 'date') return new Date(b.date) - new Date(a.date);
    if (sortBy === 'rating') return b.avgRating - a.avgRating;
    if (sortBy === 'reviews') return b.reviewCount - a.reviewCount;
    return 0;
  });

  return (
    <div style={{ maxWidth: '800px', margin: '0 auto', padding: '24px 16px 100px' }}>
      <h1 className="font-display" style={{ fontSize: '2.5rem', marginBottom: '24px' }}>Browse Games</h1>

      {/* Search */}
      <div style={{ position: 'relative', marginBottom: '16px' }}>
        <span style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: 'var(--text-dim)', fontSize: '1rem' }}>🔍</span>
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search teams, matchups, plays..."
          style={{ paddingLeft: '38px' }}
        />
      </div>

      {/* Filters */}
      <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '16px' }}>
        <div style={{ flex: 1, minWidth: '140px' }}>
          <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{ padding: '8px 12px', fontSize: '0.82rem' }}>
            <option value="all">All Types</option>
            <option value="regular">Regular Season</option>
            <option value="playoffs">Playoffs</option>
            <option value="finals">Finals</option>
            <option value="ot">Overtime</option>
          </select>
        </div>
        <div style={{ flex: 1, minWidth: '140px' }}>
          <select value={filterTeam} onChange={e => setFilterTeam(e.target.value)} style={{ padding: '8px 12px', fontSize: '0.82rem' }}>
            <option value="all">All Teams</option>
            {Object.entries(TEAMS).map(([k,v]) => <option key={k} value={k}>{v.city} {v.name}</option>)}
          </select>
        </div>
        <div style={{ flex: 1, minWidth: '140px' }}>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ padding: '8px 12px', fontSize: '0.82rem' }}>
            <option value="date">Sort: Date</option>
            <option value="rating">Sort: Rating</option>
            <option value="reviews">Sort: Most Reviewed</option>
          </select>
        </div>
      </div>

      <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginBottom: '16px', fontFamily: 'Barlow Condensed', fontWeight: 600, letterSpacing: '0.06em' }}>
        {filtered.length} game{filtered.length !== 1 ? 's' : ''}
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--text-muted)' }}>
            <div style={{ fontSize: '2rem', marginBottom: '12px' }}>🏀</div>
            <p>No games found. Try a different search.</p>
          </div>
        ) : (
          filtered.map(g => <GameCard key={g.id} game={g} onClick={() => onNavigate('game', g.id)} />)
        )}
      </div>
    </div>
  );
}

            <span style={{ fontFamily: 'Barlow Condensed', fontSize: '0.72rem', color: 'var(--accent)', fontWeight: 700, letterSpacing: '0.06em' }}>{play.time}</span>
          </div>
          <p style={{ fontSize: '0.83rem', color: 'var(--text-muted)', lineHeight: '1.45', marginBottom: '10px' }}>
            {play.description}
          </p>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                <span style={{ color: 'var(--gold)', fontSize: '0.85rem' }}>★</span>
                <span style={{ fontWeight: 700, fontSize: '0.9rem', fontFamily: 'Barlow Condensed' }}>{play.avgRating.toFixed(1)}</span>
                <span style={{ fontSize: '0.72rem', color: 'var(--text-dim)' }}>({play.ratingCount})</span>
              </div>
              <span className="badge badge-gray" style={{ fontSize: '0.6rem' }}>{play.type}</span>
            </div>
            <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
              {userRating === 0 ? (
                <div style={{ display: 'flex', gap: '1px' }}>
                  {[1,2,3,4,5].map(n => (
                    <span key={n} onClick={() => setUserRating(n)}
                      style={{ cursor: 'pointer', color: 'var(--text-dim)', fontSize: '1rem', transition: 'color 0.15s' }}
                      onMouseEnter={e => e.target.style.color = 'var(--gold)'}
                      onMouseLeave={e => e.target.style.color = 'var(--text-dim)'}
                    >★</span>
                  ))}
                </div>
              ) : (
                <div style={{ display: 'flex', gap: '1px' }}>
                  {[1,2,3,4,5].map(n => (
                    <span key={n} style={{ color: n <= userRating ? 'var(--accent)' : 'var(--text-dim)', fontSize: '1rem', cursor: 'pointer' }}
                      onClick={() => setUserRating(n)}>★</span>
                  ))}
                </div>
              )}
              <button className="btn btn-ghost btn-sm" onClick={() => setShowComment(!showComment)} style={{ padding: '3px 8px', fontSize: '0.68rem' }}>
                💬 Note
              </button>
            </div>
          </div>
          {userRating > 0 && (
            <div style={{ marginTop: '6px', fontSize: '0.75rem', color: 'var(--accent)' }}>
              ✓ You rated this {userRating}/5
            </div>
          )}
          {showComment && (
            <div style={{ marginTop: '10px' }}>
              <textarea
                value={comment}
                onChange={e => setComment(e.target.value)}
                placeholder="What made this play special?"
                rows={2}
                style={{ fontSize: '0.82rem', resize: 'none' }}
              />
              <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '8px', marginTop: '8px' }}>
                <button className="btn btn-ghost btn-sm" onClick={() => { setShowComment(false); setComment(''); }}>Cancel</button>
                <button className="btn btn-primary btn-sm" onClick={() => { setShowComment(false); }}>Save Note</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

                    ['A. Horford', '32', '8', '7', '3', '50.0', '40.0', '1', '3'],
                    ['J. Holiday', '36', '9', '5', '7', '47.6', '28.6', '3', '1'],
                  ].map((row, i) => (
                    <tr key={i} style={{ borderBottom: '1px solid var(--border)', transition: 'background 0.15s' }}
                      onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-card2)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                      {row.map((cell, j) => (
                        <td key={j} style={{ padding: '10px', textAlign: j === 0 ? 'left' : 'right', color: j === 0 ? 'var(--text)' : j === 1 ? 'var(--text-muted)' : 'var(--text)', fontWeight: j === 1 ? 400 : 500 }}>
                          {j === 0 ? <span style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>

              <strong>Dev note:</strong> Box score stats are mocked. Fetch real data from balldontlie.io /v1/box_scores or the NBA stats API.

          </div>
        )}
      </div>

      {showReviewModal && (
        <ReviewModal
          gameId={gameId}
          game={game}
          onClose={() => setShowReviewModal(false)}

    </div>
  );
}

    ? (userReviews.reduce((s, r) => s + r.rating, 0) / userReviews.length).toFixed(1)
    : '—';

            )}
          </div>
          {user.bio && (
            <p style={{ color: 'var(--text-muted)', fontSize: '0.85rem', lineHeight: '1.55', marginBottom: '12px', maxWidth: '420px' }}>
              {user.bio}
            </p>
          )}
          <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
            {user.favoriteTeams.map(t => (
              <div key={t} style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
                <TeamLogo abbr={t} size={22} />
                <span style={{ fontSize: '0.75rem', color: 'var(--text-muted)', fontFamily: 'Barlow Condensed', fontWeight: 600 }}>{t}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Stats bar */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '10px', marginBottom: '24px' }}>
        {[
          { label: 'Games', value: user.gamesLogged },
          { label: 'Reviews', value: user.reviewCount },
          { label: 'Avg Rating', value: avgRating },
          { label: 'Following', value: user.following.length },
        ].map(s => (
          <div key={s.label} className="card" style={{ padding: '12px', textAlign: 'center' }}>
            <div className="font-condensed" style={{ fontSize: '1.4rem', fontWeight: 700, color: 'var(--accent)' }}>{s.value}</div>
            <div style={{ fontSize: '0.68rem', color: 'var(--text-muted)', fontFamily: 'Barlow Condensed', fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ borderBottom: '1px solid var(--border)', marginBottom: '20px' }}>
        <div style={{ display: 'flex', gap: '24px' }}>
          {['games','reviews'].map(t => (
            <button key={t} className={`tab ${activeTab === t ? 'active' : ''}`}
              style={{ background: 'none', border: 'none', textTransform: 'capitalize' }}
              onClick={() => setActiveTab(t)}>
              {t === 'games' ? `Games (${userGames.length})` : `Reviews (${userReviews.length})`}
            </button>
          ))}
        </div>
      </div>

      {activeTab === 'games' && (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {userGames.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text-muted)' }}>No logged games yet.</div>
          ) : (
            userGames.map(g => <GameCard key={g.id} game={g} onClick={() => onNavigate('game', g.id)} />)
          )}
        </div>
      )}

      {activeTab === 'reviews' && (
        <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          {userReviews.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text-muted)' }}>No reviews yet.</div>
          ) : (
            userReviews.map(r => {
              const g = getGame(r.gameId);
              if (!g) return null;
              return (
                <div key={r.id} className="card" style={{ padding: '16px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
                    <button style={{ background: 'none', border: 'none', padding: 0, cursor: 'pointer', color: 'var(--accent)', fontSize: '0.9rem', fontWeight: 600 }}
                      onClick={() => onNavigate('game', g.id)}>
                      {TEAMS[g.awayTeam]?.name} @ {TEAMS[g.homeTeam]?.name}
                    </button>
                    <StarRating value={r.rating} size="sm" />
                  </div>
                  <div className="score-num" style={{ fontSize: '1.1rem', color: 'var(--text-muted)', marginBottom: '8px' }}>
                    {g.awayScore}–{g.homeScore}
                    <span style={{ fontSize: '0.75rem', fontFamily: 'Barlow', fontWeight: 400, marginLeft: '8px' }}>{formatDate(g.date)}</span>
                  </div>
                  {r.text && (
                    <p style={{ fontSize: '0.83rem', color: 'var(--text-muted)', lineHeight: '1.6' }}>{r.text}</p>
                  )}
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

function FeedPage({ onNavigate }) {
  const [feedType, setFeedType] = useState('following');

  const following = CURRENT_USER.following;
  const feedItems = feedType === 'following'
    ? MOCK_ACTIVITY.filter(a => following.includes(a.userId))
    : MOCK_ACTIVITY;

  return (
    <div style={{ maxWidth: '800px', margin: '0 auto', padding: '24px 16px 100px' }}>
      <h1 className="font-display" style={{ fontSize: '2.5rem', marginBottom: '4px' }}>Activity</h1>
      <p style={{ color: 'var(--text-muted)', fontSize: '0.85rem', marginBottom: '24px' }}>See what people you follow are watching and rating.</p>

      <div style={{ display: 'flex', gap: '16px', marginBottom: '24px', borderBottom: '1px solid var(--border)' }}>
        {[{id:'following',label:'Following'},{id:'all',label:'All Activity'}].map(t => (
          <button key={t.id} className={`tab ${feedType === t.id ? 'active' : ''}`}
            style={{ background: 'none', border: 'none' }}
            onClick={() => setFeedType(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
        {feedItems.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--text-muted)' }}>
            <div style={{ fontSize: '2rem', marginBottom: '12px' }}>👀</div>
            <p>No activity yet. Follow some users to see their logs.</p>
          </div>
        ) : feedItems.map(item => {
          const user = getUser(item.userId);
          const game = getGame(item.gameId);
          if (!user || !game) return null;
          const typeLabel = item.type === 'review' ? 'reviewed' : item.type === 'logged' ? 'logged' : 'rated a play in';
          return (
            <div key={item.id} className="card" style={{ padding: '14px 16px' }}>
              <div style={{ display: 'flex', gap: '12px' }}>
                <div style={{ cursor: 'pointer' }} onClick={() => onNavigate('profile', user.id)}>
                  <UserAvatar user={user} size={38} />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: '0.85rem', marginBottom: '6px' }}>
                    <span style={{ fontWeight: 600, cursor: 'pointer' }} onClick={() => onNavigate('profile', user.id)}>
                      {user.displayName}
                    </span>
                    <span style={{ color: 'var(--text-muted)' }}> {typeLabel} </span>
                    <span style={{ color: 'var(--accent)', cursor: 'pointer', fontWeight: 500 }} onClick={() => onNavigate('game', game.id)}>
                      {TEAMS[game.awayTeam]?.name} @ {TEAMS[game.homeTeam]?.name}
                    </span>
                  </div>
                  {item.rating && (
                    <div style={{ marginBottom: '6px' }}>
                      <StarRating value={item.rating} size="sm" />
                    </div>
                  )}
                  {item.excerpt && (
                    <p style={{ fontSize: '0.82rem', color: 'var(--text-muted)', lineHeight: '1.5', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden', marginBottom: '6px' }}>
                      "{item.excerpt}"
                    </p>
                  )}
                  <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                    <span style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{item.time}</span>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>
                      <TeamLogo abbr={game.homeTeam} size={16} />
                      <span style={{ fontSize: '0.7rem', color: 'var(--text-dim)' }}>{game.homeScore}–{game.awayScore}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Suggested follows */}
      <div style={{ marginTop: '32px' }}>
        <h3 className="font-condensed" style={{ fontSize: '0.9rem', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: '12px' }}>
          Suggested Users
        </h3>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
          {MOCK_USERS.filter(u => u.id !== CURRENT_USER.id && !CURRENT_USER.following.includes(u.id)).map(u => (
            <div key={u.id} className="card" style={{ padding: '12px 16px', display: 'flex', gap: '12px', alignItems: 'center' }}>
              <div style={{ cursor: 'pointer' }} onClick={() => onNavigate('profile', u.id)}>
                <UserAvatar user={u} size={38} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 600, fontSize: '0.9rem', cursor: 'pointer' }} onClick={() => onNavigate('profile', u.id)}>
                  {u.displayName}
                </div>
                <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>
                  {u.gamesLogged} games · {u.reviewCount} reviews
                </div>
              </div>
              <button className="btn btn-primary btn-sm">+ Follow</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── APP SHELL ──────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState('home');
  const [pageParam, setPageParam] = useState(null);

  const navigate = (newPage, param = null) => {
    setPage(newPage);
    setPageParam(param);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const NAV_ITEMS = [
    { id: 'home', icon: '🏠', label: 'Home' },
    { id: 'browse', icon: '🔍', label: 'Browse' },
    { id: 'feed', icon: '📡', label: 'Feed' },
    { id: 'profile', icon: '👤', label: 'Profile' },
  ];

  return (
    <div>
      {/* Desktop Nav */}
      <nav style={{
        position: 'sticky', top: 0, zIndex: 50,
        background: 'rgba(8,8,8,0.92)',
        backdropFilter: 'blur(12px)',
        borderBottom: '1px solid var(--border)',
      }}>
        <div style={{ maxWidth: '800px', margin: '0 auto', padding: '0 16px', display: 'flex', alignItems: 'center', height: '52px', gap: '24px' }}>
          <button
            onClick={() => navigate('home')}
            style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px' }}
          >
            <span style={{ fontFamily: 'Bebas Neue', fontSize: '1.4rem', letterSpacing: '0.06em' }} className="gradient-text">
              SPORTSBOXD
            </span>
          </button>

          <div style={{ display: 'flex', gap: '20px', flex: 1 }}>
            {NAV_ITEMS.map(item => (
              <button
                key={item.id}
                className={`nav-link ${page === item.id ? 'active' : ''}`}
                onClick={() => navigate(item.id)}
                style={{ background: 'none', border: 'none', display: 'flex', alignItems: 'center', gap: '5px' }}
              >
                <span style={{ fontSize: '0.8rem' }}>{item.icon}</span>
                {item.label}
              </button>
            ))}
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', cursor: 'pointer' }}
            onClick={() => navigate('profile', CURRENT_USER.id)}>
            <UserAvatar user={CURRENT_USER} size={30} />
            <span style={{ fontSize: '0.82rem', fontWeight: 500, color: 'var(--text-muted)' }}>
              {CURRENT_USER.username}
            </span>
          </div>
        </div>
      </nav>

      {/* Page Content */}
      <main>
        {page === 'home' && <HomePage onNavigate={navigate} />}
        {page === 'browse' && <BrowsePage onNavigate={navigate} />}
        {page === 'game' && <GameDetailPage gameId={pageParam} onNavigate={navigate} />}
        {page === 'feed' && <FeedPage onNavigate={navigate} />}
        {page === 'profile' && <ProfilePage userId={pageParam} onNavigate={navigate} />}
      </main>

      {/* Mobile bottom nav */}
      <div className="mobile-nav" style={{ display: 'none' }}>
        {NAV_ITEMS.map(item => (
          <button
            key={item.id}
            onClick={() => navigate(item.id)}
            style={{
              flex: 1, background: 'none', border: 'none', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '3px',
              color: page === item.id ? 'var(--accent)' : 'var(--text-dim)',
              fontSize: '0.6rem', fontFamily: 'Barlow Condensed', fontWeight: 700,
              letterSpacing: '0.06em', textTransform: 'uppercase',
            }}
          >
            <span style={{ fontSize: '1.2rem' }}>{item.icon}</span>
            {item.label}
          </button>
        ))}
      </div>

      <style>{`
        @media (max-width: 640px) {
          .mobile-nav { display: flex !important; }
          nav .nav-link { display: none; }
        }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
